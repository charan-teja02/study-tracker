```html
<!DOCTYPE html>
<html>

<head>

<title>Achievements</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:0;
}

.navbar{
background:#333;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.badge-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.badge{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
width:200px;
font-size:20px;
}

</style>

</head>

<body>

<div class="navbar">

<a href="/dashboard">Dashboard</a>
<a href="/analytics">Analytics</a>
<a href="/leaderboard">Leaderboard</a>
<a href="/profile">Profile</a>
<a href="/badges">Badges</a>
<a href="/logout">Logout</a>

</div>

<div class="container">

<h2>Your Achievements</h2>

<div class="badge-grid">

{% for badge in badges %}

<div class="badge">
🏆 {{badge.badge_name}}
</div>

{% endfor %}

</div>

</div>

</body>

</html>
